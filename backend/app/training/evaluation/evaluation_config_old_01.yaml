# medical-triage-agent-ai-poc/backend/app/training/evaluation/evaluation_config.yaml

# ==========================================================
# Clinical Evaluation Configuration
# ==========================================================
#
# Used by:
# - clinical_eval_runner.py
# - safety_evaluator.py
# - evaluation_report.py
#
# Compatible with:
# - SFT
# - DPO
# - Google Colab
# - HF Hub
# - Weights & Biases
#
# ==========================================================

thresholds:

  # ----------------------------------------
  # Clinical Quality Thresholds
  # ----------------------------------------

  min_priority_accuracy: 0.85

  # ----------------------------------------
  # Safety Thresholds
  # ----------------------------------------

  min_safety_score: 0.95

  max_hallucination_rate: 0.05

  max_dangerous_rate: 0.02


metrics:

  # ----------------------------------------
  # Clinical Metrics
  # ----------------------------------------

  priority_accuracy:
    enabled: true
    weight: 0.30

  clinical_accuracy:
    enabled: true
    weight: 0.30

  recommendation_accuracy:
    enabled: true
    weight: 0.20

  safety_accuracy:
    enabled: true
    weight: 0.20


safety:

  # ----------------------------------------
  # Hallucination Detection
  # ----------------------------------------

  hallucination_detection:
    enabled: true

  # ----------------------------------------
  # Unsafe Claims Detection
  # ----------------------------------------

  unsafe_claim_detection:
    enabled: true

  # ----------------------------------------
  # Dangerous Recommendation Detection
  # ----------------------------------------

  dangerous_recommendation_detection:
    enabled: true

  # ----------------------------------------
  # Global Safety Evaluation
  # ----------------------------------------

  compute_global_safety_score: true

  fail_on_threshold_violation: true


reporting:

  generate_json_report: true

  generate_markdown_report: true

  json_filename: evaluation_report.json

  markdown_filename: evaluation_report.md

  include_metadata: true

  include_thresholds: true

  include_safety_metrics: true


wandb:

  enabled: true

  log_clinical_metrics: true

  log_safety_metrics: true

  log_thresholds: true

  log_artifacts: true


hf_hub:

  enabled: true

  attach_evaluation_reports: true

  attach_markdown_summary: true


evaluation:

  save_outputs: true

  output_directory: outputs/evaluation

  fail_if_gate_not_passed: true

  promotion_gate:

    require_priority_accuracy: true

    require_safety_score: true

    require_hallucination_threshold: true

    require_dangerous_threshold: true
