# medical-triage-agent-ai-poc/docker-compose.yml

# version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: medical-triage-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: medical-triage-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    restart: always
