
# ==========================================================
# medical-triage-agent-ai-poc/docker-compose.yml
# ==========================================================

# version: "3.9"

services:

  backend:
    container_name: medical-triage-backend

    build:
      context: ./backend
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - .env

    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      HF_TOKEN: ${HF_TOKEN}
      HF_MODEL_ID: ${HF_MODEL_ID}
      HF_SPACE_API_URL: ${HF_SPACE_API_URL}

      MODAL_TOKEN_ID: ${MODAL_TOKEN_ID}
      MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET}
      MODAL_ENDPOINT_URL: ${MODAL_ENDPOINT_URL}

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    networks:
      - medical-triage-network

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    container_name: medical-triage-frontend

    build:
      context: ./frontend
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - .env

    environment:
      APP_ENV: ${APP_ENV:-development}
      API_BASE_URL: http://backend:8000
      HF_SPACE_API_URL: ${HF_SPACE_API_URL}

    ports:
      - "8501:8501"

    volumes:
      - ./frontend:/app

    depends_on:
      backend:
        condition: service_started

    networks:
      - medical-triage-network

  mlflow:
    container_name: medical-triage-mlflow

    image: ghcr.io/mlflow/mlflow:v3.1.0

    restart: unless-stopped

    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000

    ports:
      - "5000:5000"

    networks:
      - medical-triage-network

  prometheus:
    container_name: medical-triage-prometheus

    image: prom/prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    networks:
      - medical-triage-network

  grafana:
    container_name: medical-triage-grafana

    image: grafana/grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    networks:
      - medical-triage-network

networks:
  medical-triage-network:
    driver: bridge
