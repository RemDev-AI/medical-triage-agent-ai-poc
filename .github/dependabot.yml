# ==========================================================
# medical-triage-agent-ai-poc/.github/dependabot.yml
# ==========================================================

# MODE POC : toutes les mises à jour automatiques (version updates)
# sont bloquées via open-pull-requests-limit: 0, pour chaque
# écosystème ci-dessous, afin d'éviter les échecs de workflow
# CI/CD bloquants (Trivy gate, ResolutionImpossible pip, etc.)
# sur un projet qui n'est pas destiné à la production.
#
# ⚠️ IMPORTANT — LIMITE DE CE FICHIER ⚠️
# `open-pull-requests-limit: 0` ne bloque QUE les "version updates"
# (le cycle planifié `schedule.interval`). Il ne bloque PAS les
# "security updates" (job Dependabot déclenché automatiquement par
# une Security Advisory GitHub, indépendamment de ce fichier).
# C'est ce second mécanisme qui a échoué avec l'erreur
# "all_versions_ignored" : Dependabot a tenté de traiter une alerte
# de sécurité sur `setuptools`, a vu que TOUTES les versions sont
# ignorées ci-dessous (`>= 0`), et a levé une erreur au lieu de
# simplement ignorer silencieusement.
#
# ==> Pour bloquer réellement les security updates (et donc arrêter
#     ce message d'erreur), il faut désactiver la fonctionnalité au
#     niveau du dépôt, PAS dans ce fichier :
#     Settings > Code security > Dependabot > "Dependabot security
#     updates" > Disable.
#     (Ce réglage est indépendant de dependabot.yml.)
#
# Les scans Trivy restent actifs dans docker-build-push.yml
# (rapport SARIF non-bloquant) pour garder une visibilité sur les
# CVE sans PR ni échec de job intempestifs.
# TODO : repasser à des limites normales (5) + réactiver les
# security updates si ce POC évolue vers un projet maintenu en continu.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "backend"]
    ignore:
      - dependency-name: "setuptools"
      - dependency-name: "jaraco.context"
      - dependency-name: "wheel"

  - package-ecosystem: "pip"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "frontend"]

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "docker"]
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "docker"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "ci-cd"]
