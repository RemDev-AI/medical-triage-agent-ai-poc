# ==========================================================
# medical-triage-agent-ai-poc/.github/dependabot.yml
# ==========================================================

# MODE POC : toutes les mises à jour automatiques sont bloquées.
# `open-pull-requests-limit: 0` empêche Dependabot d'ouvrir la
# moindre PR (version updates ET security updates) sur chaque
# écosystème ci-dessous, afin d'éviter les échecs de workflow
# CI/CD bloquants (Trivy gate, ResolutionImpossible pip, etc.)
# sur un projet qui n'est pas destiné à la production.
# Les scans Trivy restent actifs dans docker-build-push.yml
# (rapport SARIF non-bloquant + gate documenté via .trivyignore)
# pour garder une visibilité sur les CVE sans PR intempestives.
# TODO : repasser à des limites normales (5) si ce POC évolue
# vers un projet maintenu en continu.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "backend"]
    ignore:
      - dependency-name: "setuptools"
      - dependency-name: "jaraco.context"
      - dependency-name: "wheel"

  - package-ecosystem: "pip"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "frontend"]

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "docker"]
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "docker"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "ci-cd"]
