# ==========================================================
# medical-triage-agent-ai-poc/.github/dependabot.yml
# ==========================================================

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    ignore:
      # setuptools est épinglé à ==77.0.3 dans requirements.txt
      # (< 78.1.1, donc CVE-2025-47273 non corrigée) parce que
      # vllm==0.25.1+cpu exige cette version exacte dans son
      # arbre de dépendances ; toute PR Dependabot proposant un
      # bump échouera systématiquement en CI avec un
      # "ResolutionImpossible" identique à celui déjà rencontré
      # (cf. historique du projet). On bloque ces PR à la
      # source plutôt que de les fermer manuellement chaque
      # semaine. Cf. backend/.trivyignore pour la CVE
      # correspondante et sa justification complète.
      # TODO : retirer cet ignore dès qu'une release vLLM
      # ultérieure desserre sa contrainte sur setuptools.
      - dependency-name: "setuptools"

  - package-ecosystem: "pip"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    ignore:
      # Bloque les montées de version majeure de l'image de base
      # python (ex: 3.12-slim -> 3.14-slim). Ces montées cassent le
      # build backend car spacy/thinc/blis (dépendances ML) ne
      # compilent pas encore sous les nouvelles versions de CPython
      # (wheels absentes, échec de compilation Cython de blis avec
      # Python 3.14). Les mises à jour mineures/patch de l'image
      # 3.12-slim restent autorisées.
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci-cd"]
