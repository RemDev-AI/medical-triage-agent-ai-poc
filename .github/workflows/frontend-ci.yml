# ==========================================================
# medical-triage-agent-ai-poc/.github/workflows/frontend-ci.yml
# ==========================================================

name: Frontend CI

on:
  push:
    branches: [main, dev-01]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, dev-01]
    paths:
      - "frontend/**"
  workflow_dispatch: {}

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  WORKDIR: frontend

jobs:
  lint:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "${{ env.WORKDIR }}/requirements.txt"

      - name: Install dependencies
        working-directory: ${{ env.WORKDIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black==26.5.1 

      - name: Ruff (lint)
        working-directory: ${{ env.WORKDIR }}
        run: ruff check streamlit_app --output-format=github

      - name: Black (format check)
        working-directory: ${{ env.WORKDIR }}
        run: black --check streamlit_app

  smoke-test:
    name: Streamlit smoke test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "${{ env.WORKDIR }}/requirements.txt"

      - name: Install dependencies
        working-directory: ${{ env.WORKDIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile check (fails on syntax errors)
        working-directory: ${{ env.WORKDIR }}
        run: python -m compileall streamlit_app -q

      - name: Headless boot smoke test
        working-directory: ${{ env.WORKDIR }}
        env:
          API_BASE_URL: "http://localhost:8000"
        run: |
          streamlit run streamlit_app/app.py \
            --server.headless true \
            --server.port 8501 &
          SERVER_PID=$!
          sleep 8
          curl --fail http://localhost:8501/_stcore/health || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID
