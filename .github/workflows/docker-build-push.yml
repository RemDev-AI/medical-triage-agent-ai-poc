# ==========================================================
# medical-triage-agent-ai-poc/.github/workflows/docker-build-push.yml
# ==========================================================

# POC — build local + scan de sécurité uniquement.
# Les images ne sont plus poussées vers un registre (GHCR) :
# HF Spaces rebuild lui-même l'image à partir du Dockerfile
# lors du déploiement (cf. deploy-huggingface.yml), donc
# l'image poussée n'était jamais consommée. Ce workflow sert
# de gate build+sécurité : deploy-huggingface.yml se déclenche
# via workflow_run uniquement si ce workflow se termine en
# "success".
# ==========================================================

name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker-build-push.yml"
  workflow_dispatch: {}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Le build Docker ne démarre qu'après validation complète des tests CI
  wait-for-ci:
    name: Gate on backend/frontend CI success
    runs-on: ubuntu-latest
    steps:
      - name: Check backend-ci status
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "Integration tests"
          ref: ${{ github.sha }}
          timeoutSeconds: 1800
          intervalSeconds: 15

  build-backend:
    name: Build & scan backend image (local)
    runs-on: ubuntu-latest
    needs: wait-for-ci
    permissions:
      contents: read
      security-events: write   # requis pour l'upload SARIF vers l'onglet Security
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image (local only)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: local/medical-triage-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # Étape 1 : scan informatif complet (ne bloque jamais le pipeline)
      # -> résultats visibles dans l'onglet "Security > Code scanning"
      - name: Trivy scan (report, non-blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "local/medical-triage-backend:ci"
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy results to Security tab
        if: always() && hashFiles('trivy-backend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-backend.sarif"
          category: trivy-backend

      # Étape 2 : gate réel, mais uniquement sur les CVE corrigibles
      # -> ignore-unfixed retire tout le bruit des paquets OS sans patch amont
      - name: Trivy scan (fail on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "local/medical-triage-backend:ci"
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          trivyignores: "./backend/.trivyignore"
          exit-code: "1"

  build-frontend:
    name: Build & scan frontend image (local)
    runs-on: ubuntu-latest
    needs: wait-for-ci
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend image (local only)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: local/medical-triage-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy scan (report, non-blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "local/medical-triage-frontend:ci"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy results to Security tab
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-frontend.sarif"
          category: trivy-frontend

      - name: Trivy scan (fail on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "local/medical-triage-frontend:ci"
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"
