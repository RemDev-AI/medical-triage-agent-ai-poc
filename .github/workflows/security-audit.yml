# medical-triage-agent-ai-poc/.github/workflows/security-audit.yml
# ==========================================================

name: Security Audit

on:
  # schedule:
    # - cron: "0 4 * * 1" # tous les lundis à 4h UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  secrets-scan:
    name: Detect leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        # POC : ce job ne doit pas bloquer le pipeline si un faux
        # positif (ou une vraie fuite déjà traitée) est détecté.
        # Le rapport reste visible dans les logs de l'action.
        # À retirer si ce garde-fou doit redevenir bloquant plus tard.
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v3
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt --desc || true

      - name: Audit frontend dependencies
        working-directory: frontend
        run: pip-audit -r requirements.txt --desc || true

# Scan des images Docker (backend + frontend) : voir
# docker-build-push.yml, jobs build-backend / build-frontend
# (Trivy sur image locale, catégories "trivy-backend" /
# "trivy-frontend" dans l'onglet Security > Code scanning).
# Job container-scan retiré ici : redondant, docker-build-push.yml
# couvre déjà backend ET frontend (celui-ci ne couvrait que le backend).
